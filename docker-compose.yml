services:
  app1:
    build: .
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - INSTANCE_NAME=app1
    depends_on:
      - db
      - cache

  app2:
    build: .
    ports:
      - "3002:3000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - INSTANCE_NAME=app2
    depends_on:
      - db
      - cache

  web-server:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - /opt/homebrew/etc/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

  cache:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: belajar_express_v2
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      TZ: Asia/Jakarta
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  worker:
    build: .
    command: npx tsx watch workers/sendEmailWorker.ts
    volumes:
      - .:/app
    env_file:
      - .env
    restart: always

volumes:
  pgdata:
  redisdata:
  rabbitmq_data: